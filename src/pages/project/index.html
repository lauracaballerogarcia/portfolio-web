<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="">
  <meta property="og:title" content="">
  <meta property="og:description" content="">
  <meta property="og:type" content="article">

  <title>Project — Portfolio</title>
  <script type="module" src="./project.js"></script>
</head>
<body id="top">

  <a href="#main-content" class="visually-hidden">Skip to main content</a>

  <site-nav></site-nav>

  <main id="main-content">

    <!-- Loading -->
    <div id="project-loading" aria-live="polite" aria-busy="true">
      <div class="container">
        <p>Loading...</p>
      </div>
    </div>

    <!-- Error -->
    <div id="project-error" hidden>
      <div class="container">
        <p role="alert">Project not found. <a href="/">Back to home</a></p>
      </div>
    </div>

    <!-- CONTENT -->
    <div id="project-content" hidden>

      <!-- Project Hero -->
      <div class="project-hero"></div>

      <!-- Layout principal -->
      <div class="project-layout container">

        <!-- Sidebar: tile, client, tags, index -->
        <div class="project-sidebar">
          <div class="project-sidebar__sticky">
            <h1 id="project-title" class="project-sidebar__title"></h1>
            <p id="project-client" class="project-sidebar__client"></p>
            <div id="project-tags" class="project-sidebar__tags"></div>
            <nav class="project-index" aria-label="Project index"></nav>
          </div>
        </div>

        <!-- Main content: summary + metadata + case study -->
        <div class="project-main">

          <!-- summary -->
          <p id="project-summary" class="project-main__summary"></p>

          <!-- metadata -->
         <dl class="project-meta">
            <div class="project-meta__item">
              <dt>Timeline</dt>
              <dd id="project-timeline"></dd>
            </div>
            <div class="project-meta__item">
              <dt>Roles</dt>
              <dd><ul id="project-role"></ul></dd>
            </div>
            <div class="project-meta__item">
              <dt>Tools</dt>
              <dd><ul id="project-tools"></ul></dd>
            </div>
            <div class="project-meta__item">
              <dt>Team</dt>
              <dd><ul id="project-team"></ul></dd>
            </div>
          </dl>

          <!-- case study -->
          <article id="project-body" class="project-body cs-grid"></article>
        </div>
      </div>

      <!-- Navegación prev / next -->
      <!-- <nav class="project-nav container" aria-label="More projects">
        <a id="project-nav-prev" href="#" hidden>
          <span aria-hidden="true">←</span>
          <span class="project-nav__label">Previous</span>
          <span id="project-nav-prev-title" class="project-nav__title"></span>
        </a>
        <a id="project-nav-next" href="#" hidden>
          <span class="project-nav__label">Next</span>
          <span id="project-nav-next-title" class="project-nav__title"></span>
          <span aria-hidden="true">→</span>
        </a>
      </nav> -->
    </div>

  </main>

  <site-footer></site-footer>

</body>
</html>
